<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-title class="titulo-app">Mis Tareas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="fondo-gris">

  <!-- Tarjeta de progreso -->
  <div class="card-progreso" *ngIf="tasks.length > 0">
    <div class="fila-stats">
      <div class="stat">
        <span class="stat-numero">{{ tasks.length }}</span>
        <span class="stat-texto">Total</span>
      </div>
      <div class="stat">
        <span class="stat-numero naranja">{{ pendientes }}</span>
        <span class="stat-texto">Pendientes</span>
      </div>
      <div class="stat">
        <span class="stat-numero verde">{{ progreso }}%</span>
        <span class="stat-texto">Completado</span>
      </div>
    </div>
    <div class="barra-fondo">
      <div class="barra-relleno" [style.width.%]="progreso"></div>
    </div>
  </div>

  <!-- Pantalla vacía -->
  <div class="pantalla-vacia" *ngIf="tasks.length === 0">
    <ion-icon name="checkmark-done-circle-outline"></ion-icon>
    <h2>Sin tareas pendientes</h2>
    <p>Toca el botón + para agregar una</p>
  </div>

  <!-- Lista de tareas -->
  <ion-list class="lista" *ngIf="tasks.length > 0">
    <ion-item-sliding *ngFor="let tarea of tasks">

      <!-- Desliza a la derecha → marcar hecha -->
      <ion-item-options side="start">
        <ion-item-option
          [color]="tarea.done ? 'medium' : 'success'"
          (click)="marcarHecha(tarea)"
          expandable>
          <ion-icon slot="icon-only" [name]="tarea.done ? 'arrow-undo' : 'checkmark'"></ion-icon>
        </ion-item-option>
      </ion-item-options>

      <!-- Tarea -->
      <ion-item class="item-tarea" [class.tarea-hecha]="tarea.done" lines="none">
        <div slot="start" class="circulo" [class.circulo-activo]="tarea.done" (click)="marcarHecha(tarea)">
          <ion-icon *ngIf="tarea.done" name="checkmark" class="icono-check"></ion-icon>
        </div>
        <ion-label>
          <h2 [class.tachado]="tarea.done">{{ tarea.title }}</h2>
          <p>{{ tarea.done ? 'Completada' : 'Pendiente' }}</p>
        </ion-label>
      </ion-item>

      <!-- Desliza a la izquierda → editar o eliminar -->
      <ion-item-options side="end">
        <ion-item-option color="warning" (click)="editar(tarea)">
          <ion-icon slot="icon-only" name="create-outline"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="eliminar(tarea)" expandable>
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

  <!-- Botón flotante + -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="agregar()" class="boton-agregar">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
