<ion-header class="ion-no-border">
  <ion-toolbar class="focus-toolbar">
    <div class="focus-header">
      <div class="header-brand">
        <span class="brand-dot"></span>
        <span class="brand-name">FocusTask</span>
      </div>
      <span class="header-date">{{ today }}</span>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="focus-bg">

  <!-- Tarjeta de estadisticas -->
  <div class="stats-card" *ngIf="items.length > 0">
    <div class="stats-row">
      <div class="stat-block">
        <span class="stat-val">{{ items.length }}</span>
        <span class="stat-lbl">Total</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <span class="stat-val accent-orange">{{ pending }}</span>
        <span class="stat-lbl">En curso</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-block">
        <span class="stat-val accent-blue">{{ completion }}%</span>
        <span class="stat-lbl">Logrado</span>
      </div>
    </div>
    <div class="progress-track">
      <div class="progress-fill" [style.width.%]="completion"></div>
    </div>
  </div>

  <!-- Estado vacio -->
  <div class="empty-state" *ngIf="items.length === 0">
    <div class="empty-icon-wrap">
      <ion-icon name="rocket-outline"></ion-icon>
    </div>
    <h2>Todo listo</h2>
    <p>Agrega tu primera tarea y comienza a enfocarte</p>
  </div>

  <!-- Lista de tareas -->
  <ion-list class="focus-list" *ngIf="items.length > 0">
    <ion-item-sliding *ngFor="let item of items">

      <!-- Desliza derecha → completar -->
      <ion-item-options side="start">
        <ion-item-option
          [color]="item.done ? 'medium' : 'success'"
          (click)="toggleItem(item)"
          expandable>
          <ion-icon slot="icon-only" [name]="item.done ? 'arrow-undo-outline' : 'checkmark-outline'"></ion-icon>
        </ion-item-option>
      </ion-item-options>

      <!-- Item -->
      <ion-item class="focus-item" [class.item-done]="item.done" lines="none">
        <div slot="start" class="check-circle" [class.check-active]="item.done" (click)="toggleItem(item)">
          <ion-icon *ngIf="item.done" name="checkmark" class="check-icon"></ion-icon>
        </div>
        <ion-label>
          <h2 [class.strikethrough]="item.done">{{ item.title }}</h2>
          <p>{{ item.done ? 'Completada' : 'En progreso' }}</p>
        </ion-label>
      </ion-item>

      <!-- Desliza izquierda → editar o eliminar -->
      <ion-item-options side="end">
        <ion-item-option color="warning" (click)="editItem(item)">
          <ion-icon slot="icon-only" name="pencil-outline"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="removeItem(item)" expandable>
          <ion-icon slot="icon-only" name="close-outline"></ion-icon>
        </ion-item-option>
      </ion-item-options>

    </ion-item-sliding>
  </ion-list>

  <!-- Boton agregar -->
  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button (click)="addItem()" class="fab-add">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>

</ion-content>
